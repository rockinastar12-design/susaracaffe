<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Susara Caffe Baglung | Digital Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5d4037;
            --highlight: #f4a261;
            --bg: #faf9f6;
            --dark: #1a1a1a;
            --card: #ffffff;
            --danger: #e63946;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--dark); padding-bottom: 220px; }
        
        header { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=800&q=80');
            background-size: cover; background-position: center; color: white; padding: 40px 20px; text-align: center;
        }

        .logo { font-family: 'Syncopate'; font-size: 1.5rem; letter-spacing: 2px; margin: 0; }
        .sub-logo { font-size: 0.8rem; opacity: 0.8; letter-spacing: 4px; }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        
        .section-title { 
            color: var(--primary); border-bottom: 2px solid var(--highlight); 
            display: inline-block; margin: 30px 0 15px; font-size: 1.1rem; font-weight: 800;
        }

        .table-input-section {
            background: var(--highlight);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #table-number {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--primary);
            width: 60px;
            font-size: 1rem;
            text-align: center;
            font-weight: bold;
        }

        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .item-card { 
            background: var(--card); padding: 15px; border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center;
        }

        .item-info h4 { margin: 0; font-size: 1rem; }
        .item-info p { margin: 5px 0 0; color: var(--primary); font-weight: 700; }

        .add-btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; }

        .momo-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; font-size: 0.85rem; }
        .momo-table th, .momo-table td { padding: 10px; text-align: center; border: 1px solid #eee; }
        .momo-table th { background: var(--primary); color: white; }
        .momo-btn { background: #f0ebe9; border: none; padding: 6px; border-radius: 5px; cursor: pointer; font-weight: 700; width: 100%; }

        #cart-bar { 
            position: fixed; bottom: 20px; left: 10px; right: 10px; background: var(--dark); 
            color: white; padding: 20px; border-radius: 25px; display: none; 
            flex-direction: column; gap: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); z-index: 1000;
        }

        .order-preview { font-size: 0.85rem; max-height: 80px; overflow-y: auto; color: #ccc; border-bottom: 1px solid #444; padding-bottom: 8px; }
        .cart-summary { display: flex; justify-content: space-between; font-weight: 800; font-size: 1rem; }
        .cart-actions { display: flex; gap: 10px; }
        .checkout-btn { flex: 2; background: var(--highlight); color: var(--dark); border: none; padding: 12px; border-radius: 15px; font-weight: 800; cursor: pointer; }
        .cancel-btn { flex: 1; background: var(--danger); color: white; border: none; padding: 12px; border-radius: 15px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1 class="logo">SUSARA CAFFE</h1>
    <div class="sub-logo">• BAGLUNG</div>
</header>

<div class="container">
    <div class="table-input-section">
        <label style="font-weight:800">TABLE NO (01-99):</label>
        <input type="number" id="table-number" placeholder="00" oninput="if(this.value.length > 2) this.value = this.value.slice(0, 2);">
    </div>

    <div class="section-title">COFFEE & HOT DRINKS</div>
    <div class="menu-grid" id="coffee-list"></div>

    <div class="section-title">TEA ESTATE SELECTION</div>
    <div class="menu-grid" id="tea-list"></div>

    <div class="section-title">BREAKFAST & QUICK BITES</div>
    <div id="breakfast-list" class="menu-grid"></div>

    <div class="section-title">MOMO SPECIALS</div>
    <table class="momo-table">
        <thead><tr><th>TYPE</th><th>STM</th><th>FRY</th><th>JHL</th><th>CHL</th></tr></thead>
        <tbody id="momo-list"></tbody>
    </table>

    <div class="section-title">CHOWMEIN & THUKPA</div>
    <div id="noodle-list" class="menu-grid"></div>

    <div class="section-title">SANDWICH & BURGERS</div>
    <div id="sandwich-list" class="menu-grid"></div>

    <div class="section-title">COMBO ITEMS</div>
    <div id="combo-list" class="menu-grid"></div>

    <div class="section-title">SNACKS & SIDES</div>
    <div id="snacks-list" class="menu-grid"></div>

    <div class="section-title">LASSI & SALAD</div>
    <div id="lassi-list" class="menu-grid"></div>
</div>

<div id="cart-bar">
    <div class="order-preview" id="order-preview"></div>
    <div class="cart-summary">
        <span>Items: <span id="cart-count">0</span></span>
        <span>Total: Rs. <span id="cart-total">0</span></span>
    </div>
    <div class="cart-actions">
        <button class="cancel-btn" onclick="clearOrder()">CANCEL</button>
        <button class="checkout-btn" onclick="sendToManager()">SEND ORDER</button>
    </div>
</div>

<script>
    const menuData = {
        coffee: [
            {n: "Ristretto", p: 100}, {n: "Espresso", p: 100}, {n: "Doppio", p: 150},
            {n: "Americano", p: 130}, {n: "Cappuccino", p: 150}, {n: "Café Latte", p: 200},
            {n: "Honey Latte", p: 220}, {n: "Lungo", p: 160}, {n: "Mocaccino", p: 180},
            {n: "Flat White", p: 180}, {n: "Hot Chocolate", p: 200}, {n: "Hot Lemon with Honey", p: 100}
        ],
        tea: [ {n: "Lemon Tea", p: 60}, {n: "Green Tea", p: 50}, {n: "Black Tea", p: 50} ],
        breakfast: [
            {n: "Chana Tarkari", p: 80}, {n: "Chana Anda", p: 120}, 
            {n: "Samosa Tarkari", p: 120}, {n: "Lachha Paratha Tarkari", p: 110}, 
            {n: "Boiled Egg", p: 40}, {n: "Parauta", p: 100}, {n: "Puri Tarkari", p: 120}, 
            {n: "Sel Roti", p: 50}, {n: "Omelette", p: 100}, {n: "Bread Omelette", p: 120}
        ],
        momo: [
            {t: "Veg", s: 130, f: 160, j: 190, c: 220},
            {t: "Chicken", s: 150, f: 200, j: 220, c: 250},
            {t: "Banana", s: 150, f: 200, j: 220, c: 250},
            {t: "Fish", s: 200, f: 250, j: 280, c: 300}
        ],
        noodle: [
            {n: "Veg Chowmein", p: 120}, {n: "Chicken Chowmein", p: 180}, {n: "Egg Chowmein", p: 150}, {n: "Mix Chowmein", p: 250},
            {n: "Veg Thukpa", p: 180}, {n: "Chicken Thukpa", p: 230}, {n: "Egg Thukpa", p: 210}, {n: "Mix Thukpa", p: 250}
        ],
        sandwich: [
            {n: "Veg Sandwich", p: 150}, {n: "Egg Sandwich", p: 190}, {n: "Chicken Sandwich", p: 220}, {n: "Mix Sandwich", p: 250},
            {n: "Chicken Burger", p: 250}, {n: "Mix Burger", p: 300}, {n: "Veg Katti Roll", p: 180}, {n: "Chicken Katti Roll", p: 250}
        ],
        combo: [ {n: "Veg Combo", p: 200}, {n: "Chicken Combo", p: 250}, {n: "Mix Combo", p: 280} ],
        snacks: [
            {n: "Sausage", p: 220}, {n: "Chicken Chilly", p: 300}, {n: "Chicken Fry", p: 300},
            {n: "Chicken Wings", p: 350}, {n: "Chicken Lollipop", p: 300}, {n: "French Fry", p: 200},
            {n: "Peanut Sadeko", p: 150}, {n: "Bhatmas Sadeko", p: 150}
        ],
        lassi: [
            {n: "Plain Lassi", p: 120}, {n: "Banana Lassi", p: 150}, {n: "Mix Lassi", p: 180}, {n: "Chocolate Lassi", p: 150},
            {n: "Green Salad", p: 150}, {n: "Mix Salad", p: 250}
        ]
    };

    let cart = [];
    let total = 0;

    function renderItems(id, data) {
        const container = document.getElementById(id);
        if(!container) return;
        data.forEach(item => {
            container.innerHTML += `
                <div class="item-card">
                    <div class="item-info"><h4>${item.n}</h4><p>Rs. ${item.p}</p></div>
                    <button class="add-btn" onclick="addToCart('${item.n}', ${item.p})">ADD</button>
                </div>`;
        });
    }

    function renderMomo() {
        const container = document.getElementById('momo-list');
        menuData.momo.forEach(m => {
            container.innerHTML += `
                <tr>
                    <td><b>${m.t}</b></td>
                    <td><button class="momo-btn" onclick="addToCart('${m.t} Stm', ${m.s})">${m.s}</button></td>
                    <td><button class="momo-btn" onclick="addToCart('${m.t} Fry', ${m.f})">${m.f}</button></td>
                    <td><button class="momo-btn" onclick="addToCart('${m.t} Jhl', ${m.j})">${m.j}</button></td>
                    <td><button class="momo-btn" onclick="addToCart('${m.t} Chl', ${m.c})">${m.c}</button></td>
                </tr>`;
        });
    }

    function addToCart(name, price) {
        cart.push({name, price});
        total += price;
        updateCartDisplay();
    }

    function updateCartDisplay() {
        const bar = document.getElementById('cart-bar');
        const preview = document.getElementById('order-preview');
        if (cart.length > 0) {
            bar.style.display = 'flex';
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = total;
            preview.innerText = cart.map(i => `${i.name}`).join(", ");
        } else {
            bar.style.display = 'none';
        }
    }

    function clearOrder() {
        if(confirm("Clear order?")) {
            cart = []; total = 0;
            updateCartDisplay();
        }
    }

    function sendToManager() {
        const phone = "9779849957082";
        const table = document.getElementById('table-number').value;
        if(!table || table.length > 2) {
            alert("Please enter a valid 2-digit Table Number!");
            return;
        }

        let receipt = `*--- SUSARA CAFFE RECEIPT ---*\n`;
        receipt += `📍 TABLE NO: ${table}\n`;
        receipt += `📅 DATE: ${new Date().toLocaleDateString()}\n`;
        receipt += `------------------------------\n`;
        cart.forEach((item, index) => {
            receipt += `${index + 1}. ${item.name} - Rs.${item.price}\n`;
        });
        receipt += `------------------------------\n`;
        receipt += `*GRAND TOTAL: Rs. ${total}*\n`;
        receipt += `------------------------------\n`;
        receipt += `_Sent via Susara Digital Menu_`;

        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(receipt)}`);
    }

    window.onload = () => {
        renderItems('coffee-list', menuData.coffee);
        renderItems('tea-list', menuData.tea);
        renderItems('breakfast-list', menuData.breakfast);
        renderItems('noodle-list', menuData.noodle);
        renderItems('sandwich-list', menuData.sandwich);
        renderItems('combo-list', menuData.combo);
        renderItems('snacks-list', menuData.snacks);
        renderItems('lassi-list', menuData.lassi);
        renderMomo();
    };
</script>
</body>
</html>
